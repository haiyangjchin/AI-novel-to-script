<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 小说转剧本工具</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #2c2416;
    --text-secondary: #6b5e4a;
    --accent: #b8753b;
    --accent-hover: #9a5f2e;
    --border: #e5ddd0;
    --tag-bg: #f5efe4;
    --error-bg: #fef2f2;
    --error-text: #991b1b;
    --error-border: #fecaca;
    --success-text: #166534;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- Canvas 背景 ---- */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ---- 头部 ---- */
  .header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 18px 20px 10px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* ---- 主布局 ---- */
  .main {
    position: relative; z-index: 1;
    max-width: 1500px;
    width: 90%;
    margin: 0 auto;
    padding: 0 0 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    height: calc(100vh - 80px);
    min-height: 0;
    overflow: hidden;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
  }

  /* ---- 卡片 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--tag-bg);
  }
  .card-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .card-body {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    min-height: 0;
  }

  /* ---- 文本输入 ---- */
  #novel-input {
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  #novel-input:focus {
    border-color: var(--accent);
  }
  #novel-input::placeholder {
    color: #c4b8a7;
  }

  /* ---- 按钮 ---- */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--tag-bg); }

  /* ---- YAML 输出区 ---- */
  #yaml-output {
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    background: #fdfcf9;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #yaml-output:empty::after {
    content: "转换结果将在这里显示...";
    color: #c4b8a7;
  }

  /* ---- 状态提示 ---- */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    animation: slideDown 0.3s ease;
    display: none;
  }
  .toast.error {
    display: block;
    background: var(--error-bg);
    color: var(--error-text);
    border: 1px solid var(--error-border);
  }
  .toast.success {
    display: block;
    background: #f0fdf4;
    color: var(--success-text);
    border: 1px solid #bbf7d0;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ---- 加载动画 ---- */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .loading .spinner { display: inline-block; }
  .loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- 字数统计 ---- */
  .char-count {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ---- 输出区标签切换 ---- */
  .output-tabs {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .output-tab {
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: var(--card);
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.2s;
  }
  .output-tab:hover { background: var(--tag-bg); }
  .output-tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* ---- 场景卡片预览 ---- */
  #scene-preview {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  #scene-preview.show { display: flex; }

  .scene-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .scene-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--tag-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .scene-id { font-weight: 700; color: var(--accent); font-size: 0.85rem; }
  .scene-act {
    font-size: 0.75rem;
    color: var(--text-secondary);
    background: var(--card);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .scene-location, .scene-time {
    font-size: 0.82rem;
    color: var(--text-secondary);
  }
  .scene-card-body { padding: 14px 16px; }

  .scene-setting {
    font-size: 0.84rem;
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--tag-bg);
    border-radius: 6px;
    border-left: 3px solid var(--accent);
  }

  .scene-characters {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    font-size: 0.8rem;
  }
  .scene-characters .label { color: var(--text-secondary); font-weight: 500; }
  .char-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    background: #ede9fe;
    color: #5b21b6;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .scene-actions { margin-bottom: 12px; }
  .scene-actions .label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }
  .action-item {
    font-size: 0.82rem;
    color: var(--text-secondary);
    padding: 3px 0 3px 14px;
    position: relative;
    line-height: 1.6;
  }
  .action-item::before {
    content: "·";
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: 700;
  }

  .scene-dialogues { margin-bottom: 12px; }
  .scene-dialogues .label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: block;
  }
  .dialogue-bubble {
    margin-bottom: 8px;
    padding: 10px 14px;
    background: #faf8f5;
    border-radius: 8px;
    border: 1px solid var(--border);
    position: relative;
  }
  .dialogue-speaker {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .dialogue-emotion {
    font-size: 0.73rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-left: 6px;
  }
  .dialogue-line {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
    font-family: "Noto Serif SC", Georgia, serif;
    quotes: "\\201C" "\\201D";
  }
  .dialogue-line::before { content: "\\201C"; }
  .dialogue-line::after { content: "\\201D"; }
  .dialogue-detail {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .dialogue-detail span { margin-right: 12px; }

  .scene-footer {
    display: flex;
    gap: 16px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .convert-status {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .convert-status.show { display: inline-flex; }
  .convert-status.ok { color: #166534; background: #dcfce7; }
  .convert-status.warn { color: #92400e; background: #fef3c7; }
  .api-key-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .api-key-row label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    white-space: nowrap;
    font-weight: 500;
  }
  .api-key-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.82rem;
    font-family: "Consolas", monospace;
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-row input:focus {
    border-color: var(--accent);
  }

  /* ---- 章节信息 ---- */
  .chapter-info {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    min-height: 24px;
  }
  .chapter-info .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .badge-ok { background: #dcfce7; color: #166534; }
  .badge-warn { background: #fef3c7; color: #92400e; }

  /* ---- YAML key 高亮 ---- */
  .yaml-key { color: #b8753b; }
  .yaml-string { color: #166534; }
  .yaml-comment { color: #9ca3af; font-style: italic; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="header">
  <h1>AI 小说转剧本工具</h1>
  <p>将小说章节自动转换为结构化 YAML 剧本，快速获得可编辑的剧本初稿</p>
</div>

<div class="main">

  <!-- 左侧：输入区 -->
  <div class="card">
    <div class="card-header">
      <h2>📖 小说原文</h2>
      <span class="char-count" id="char-count">0 字</span>
    </div>
    <div class="card-body">
      <div class="api-key-row">
        <label for="api-key">Key</label>
        <input type="password" id="api-key" placeholder="输入 DeepSeek API Key..." autocomplete="off">
      </div>
      <textarea id="novel-input" placeholder="在此粘贴小说文本（至少 3 章）..."></textarea>
      <div class="chapter-info" id="chapter-info"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-sample">加载示例文本</button>
        <button class="btn btn-primary" id="btn-convert">
          <span class="btn-text">转换为剧本</span>
          <span class="spinner"></span>
        </button>
        <span class="convert-status" id="convert-status"></span>
      </div>
    </div>
  </div>

  <!-- 右侧：输出区 -->
  <div class="card">
    <div class="card-header">
      <div class="output-tabs">
        <button class="output-tab active" id="tab-source">源码</button>
        <button class="output-tab" id="tab-preview">预览</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="btn-copy" style="padding:6px 14px;font-size:0.82rem;" disabled>复制</button>
        <button class="btn btn-secondary" id="btn-download" style="padding:6px 14px;font-size:0.82rem;" disabled>下载 YAML</button>
      </div>
    </div>
    <div class="card-body">
      <pre id="yaml-output"></pre>
      <div id="scene-preview"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== Canvas 背景装饰 =====
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 柔和的圆点装饰
  const dots = [
    { x: canvas.width * 0.08, y: canvas.height * 0.15, r: 2.5, a: 0.12 },
    { x: canvas.width * 0.12, y: canvas.height * 0.22, r: 1.8, a: 0.08 },
    { x: canvas.width * 0.85, y: canvas.height * 0.18, r: 2.0, a: 0.10 },
    { x: canvas.width * 0.90, y: canvas.height * 0.28, r: 3.0, a: 0.06 },
    { x: canvas.width * 0.92, y: canvas.height * 0.70, r: 2.2, a: 0.09 },
    { x: canvas.width * 0.06, y: canvas.height * 0.75, r: 1.6, a: 0.11 },
    { x: canvas.width * 0.15, y: canvas.height * 0.85, r: 2.4, a: 0.07 },
    { x: canvas.width * 0.50, y: canvas.height * 0.05, r: 1.4, a: 0.05 },
  ];

  ctx.fillStyle = '#b8753b';
  for (const d of dots) {
    ctx.globalAlpha = d.a;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 柔和的连接线
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#b8753b';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dots[0].x, dots[0].y);
  ctx.bezierCurveTo(
    canvas.width * 0.3, canvas.height * 0.1,
    canvas.width * 0.6, canvas.height * 0.3,
    dots[3].x, dots[3].y
  );
  ctx.stroke();

  ctx.globalAlpha = 1;
}
drawBg();
window.addEventListener('resize', drawBg);

// ===== 页面逻辑 =====
const novelInput = document.getElementById('novel-input');
const yamlOutput = document.getElementById('yaml-output');
const apiKeyInput = document.getElementById('api-key');
const btnConvert = document.getElementById('btn-convert');
const btnSample = document.getElementById('btn-sample');
const btnDownload = document.getElementById('btn-download');
const btnCopy = document.getElementById('btn-copy');
const charCount = document.getElementById('char-count');
const chapterInfo = document.getElementById('chapter-info');
const convertStatus = document.getElementById('convert-status');
const tabSource = document.getElementById('tab-source');
const tabPreview = document.getElementById('tab-preview');
const scenePreview = document.getElementById('scene-preview');
const toast = document.getElementById('toast');

let lastChapterResult = null;  // 缓存最近一次章节检测结果
let lastRawYaml = '';          // 缓存最近一次转换的原始 YAML

// 从 localStorage 恢复 API Key
const savedKey = localStorage.getItem('deepseek_api_key');
if (savedKey) apiKeyInput.value = savedKey;

// 保存 API Key
apiKeyInput.addEventListener('input', () => {
  localStorage.setItem('deepseek_api_key', apiKeyInput.value);
});

// 字数统计 + 章节检测（防抖）
let detectTimer = null;
novelInput.addEventListener('input', () => {
  charCount.textContent = novelInput.value.length + ' 字';
  clearTimeout(detectTimer);
  detectTimer = setTimeout(detectChapters, 600);
});

// 章节检测
async function detectChapters() {
  const text = novelInput.value.trim();
  if (!text) {
    chapterInfo.innerHTML = '';
    return;
  }
  try {
    const resp = await fetch('/api/detect-chapters', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novel_text: text }),
    });
    const data = await resp.json();
    lastChapterResult = data;
    if (data.count > 0) {
      const titles = data.chapters.map(c => c.title).join('、');
      const cls = data.meets_minimum ? 'badge badge-ok' : 'badge badge-warn';
      const label = data.meets_minimum ? '可转换' : '不足3章';
      chapterInfo.innerHTML = `<span class="${cls}">${data.count} 章</span> ${label} · ${titles}`;
    } else {
      lastChapterResult = null;
      chapterInfo.innerHTML = '<span class="badge badge-warn">未识别到章节</span> 请确保文本包含"第X章"等章节标记';
    }
    updateConvertStatus();
  } catch (e) {
    // 静默失败，不影响主流程
  }
}

function updateConvertStatus() {
  if (!lastChapterResult || lastChapterResult.count === 0) {
    convertStatus.className = 'convert-status';
    convertStatus.textContent = '';
    return;
  }
  if (lastChapterResult.meets_minimum) {
    convertStatus.className = 'convert-status show ok';
    convertStatus.textContent = '✓ ' + lastChapterResult.count + ' 章，可以转换';
  } else {
    convertStatus.className = 'convert-status show warn';
    convertStatus.textContent = '⚠ 仅 ' + lastChapterResult.count + ' 章，至少需要 3 章';
  }
}

// 标签切换：源码 / 预览
tabSource.addEventListener('click', () => {
  tabSource.classList.add('active');
  tabPreview.classList.remove('active');
  yamlOutput.style.display = '';
  scenePreview.classList.remove('show');
});
tabPreview.addEventListener('click', () => {
  tabPreview.classList.add('active');
  tabSource.classList.remove('active');
  yamlOutput.style.display = 'none';
  scenePreview.classList.add('show');
  if (lastRawYaml) renderSceneCards(lastRawYaml);
});

// 解析 YAML 并渲染场景卡片
function renderSceneCards(yamlText) {
  scenePreview.innerHTML = '';
  let data;
  try {
    data = jsyaml.load(yamlText);
  } catch {
    scenePreview.innerHTML = '<div style="padding:20px;color:var(--error-text);text-align:center;">YAML 解析失败，请切换到"源码"查看</div>';
    return;
  }
  if (!data || !data.scenes || !data.scenes.length) {
    scenePreview.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center;">暂无场景数据</div>';
    return;
  }
  const characters = data.characters || [];
  const charMap = {};
  characters.forEach(c => { charMap[c.id] = c; });

  data.scenes.forEach(scene => {
    const card = document.createElement('div');
    card.className = 'scene-card';

    let charTags = '';
    if (scene.characters_present) {
      charTags = scene.characters_present.map(id => {
        const name = charMap[id] ? charMap[id].name : id;
        return `<span class="char-tag">${escHtml(name)}</span>`;
      }).join('');
    }

    let actionsHtml = '';
    if (scene.actions && scene.actions.length) {
      actionsHtml = '<div class="scene-actions"><span class="label">📝 动作</span>' +
        scene.actions.map(a => `<div class="action-item">${escHtml(a.content)}</div>`).join('') +
        '</div>';
    }

    let dialoguesHtml = '';
    if (scene.dialogues && scene.dialogues.length) {
      dialoguesHtml = '<div class="scene-dialogues"><span class="label">💬 对话</span>' +
        scene.dialogues.map(d => {
          const speakerName = charMap[d.character] ? charMap[d.character].name : d.character;
          let detail = '';
          if (d.parenthetical || d.action) {
            detail = '<div class="dialogue-detail">';
            if (d.parenthetical) detail += `<span>🎭 ${escHtml(d.parenthetical)}</span>`;
            if (d.action) detail += `<span>🎬 ${escHtml(d.action)}</span>`;
            detail += '</div>';
          }
          return `<div class="dialogue-bubble">
            <div class="dialogue-speaker">${escHtml(speakerName)}<span class="dialogue-emotion">${escHtml(d.emotion || '')}</span></div>
            <div class="dialogue-line">${escHtml(d.line)}</div>
            ${detail}
          </div>`;
        }).join('') +
        '</div>';
    }

    let footerHtml = '';
    if (scene.notes || scene.transition) {
      footerHtml = '<div class="scene-footer">';
      if (scene.notes) footerHtml += `<span>📌 ${escHtml(scene.notes)}</span>`;
      if (scene.transition) footerHtml += `<span>🎞 ${escHtml(scene.transition)}</span>`;
      footerHtml += '</div>';
    }

    card.innerHTML = `
      <div class="scene-card-header">
        <span class="scene-id">${escHtml(scene.id)}</span>
        ${scene.act ? `<span class="scene-act">第${escHtml(String(scene.act))}幕</span>` : ''}
        ${scene.location ? `<span class="scene-location">📍 ${escHtml(scene.location)}</span>` : ''}
        ${scene.time ? `<span class="scene-time">🕐 ${escHtml(scene.time)}</span>` : ''}
      </div>
      <div class="scene-card-body">
        ${scene.setting ? `<div class="scene-setting">${escHtml(scene.setting)}</div>` : ''}
        ${charTags ? `<div class="scene-characters"><span class="label">👤 出场</span>${charTags}</div>` : ''}
        ${actionsHtml}
        ${dialoguesHtml}
        ${footerHtml}
      </div>`;
    scenePreview.appendChild(card);
  });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 加载示例文本
btnSample.addEventListener('click', async () => {
  btnSample.textContent = '加载中...';
  btnSample.disabled = true;
  try {
    const resp = await fetch('/sample/novel.txt');
    if (!resp.ok) throw new Error('示例文件加载失败');
    const text = await resp.text();
    novelInput.value = text;
    charCount.textContent = text.length + ' 字';
    detectChapters();
  } catch (e) {
    showToast('加载示例失败: ' + e.message, 'error');
  } finally {
    btnSample.textContent = '加载示例文本';
    btnSample.disabled = false;
  }
});

// 转换（SSE 流式）
btnConvert.addEventListener('click', async () => {
  const text = novelInput.value.trim();
  if (!text) {
    showToast('请先输入小说文本', 'error');
    return;
  }

  // 章节数校验：未检测过则先检测
  if (!lastChapterResult) {
    await detectChapters();
  }
  if (!lastChapterResult || !lastChapterResult.meets_minimum) {
    const count = lastChapterResult ? lastChapterResult.count : 0;
    if (count === 0) {
      showToast('未识别到章节，请确保文本包含"第X章"等章节标记，且至少 3 章', 'error');
    } else {
      showToast(`仅检测到 ${count} 章，至少需要 3 章小说内容才能转换`, 'error');
    }
    return;
  }

  btnConvert.classList.add('loading');
  btnConvert.disabled = true;
  yamlOutput.textContent = '';
  scenePreview.innerHTML = '';
  lastRawYaml = '';
  // 转换开始时切回源码标签
  tabSource.classList.add('active');
  tabPreview.classList.remove('active');
  yamlOutput.style.display = '';
  scenePreview.classList.remove('show');
  let accumulated = '';

  try {
    const resp = await fetch('/api/convert-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novel_text: text, api_key: apiKeyInput.value }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '请求失败');
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'chunk') {
          accumulated += data.content;
          yamlOutput.innerHTML = highlightYaml(accumulated);
          yamlOutput.scrollTop = yamlOutput.scrollHeight;
        } else if (data.type === 'done' || data.type === 'done_warn') {
          yamlOutput.innerHTML = highlightYaml(data.yaml_content);
          lastRawYaml = data.yaml_content;
          btnDownload.disabled = false;
          btnCopy.disabled = false;
          if (data.warning) {
            showToast(data.warning, 'error');
          } else {
            showToast('转换完成！', 'success');
          }
        } else if (data.type === 'error') {
          showToast('转换失败: ' + data.message, 'error');
        }
      }
    }

    btnConvert.classList.remove('loading');
    btnConvert.disabled = false;

  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    btnConvert.classList.remove('loading');
    btnConvert.disabled = false;
  }
});

// 下载 YAML
btnDownload.addEventListener('click', () => {
  const content = yamlOutput.textContent;
  if (!content) return;
  const blob = new Blob([content], { type: 'text/yaml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'screenplay.yaml';
  a.click();
  URL.revokeObjectURL(url);
});

// 复制到剪贴板
btnCopy.addEventListener('click', async () => {
  const content = yamlOutput.textContent;
  if (!content) return;
  try {
    await navigator.clipboard.writeText(content);
    const original = btnCopy.textContent;
    btnCopy.textContent = '已复制';
    setTimeout(() => { btnCopy.textContent = original; }, 2000);
  } catch {
    showToast('复制失败，请手动复制', 'error');
  }
});

// Toast 提示
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast ' + type;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

// YAML 语法高亮
function highlightYaml(yaml) {
  return yaml
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // 注释
    .replace(/(#.*$)/gm, '<span class="yaml-comment">$1</span>')
    // key:
    .replace(/^(\s*)([\w一-鿿-]+)(\s*:)/gm,
      '$1<span class="yaml-key">$2</span>$3')
    // 字符串值（引号内）
    .replace(/("[^"]*")/g, '<span class="yaml-string">$1</span>');
}
