<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI 小说转剧本工具</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #2c2416;
    --text-secondary: #6b5e4a;
    --accent: #b8753b;
    --accent-hover: #9a5f2e;
    --border: #e5ddd0;
    --tag-bg: #f5efe4;
    --error-bg: #fef2f2;
    --error-text: #991b1b;
    --error-border: #fecaca;
    --success-text: #166534;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ---- Canvas 背景 ---- */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ---- 头部 ---- */
  .header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 18px 20px 10px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* ---- 主布局 ---- */
  .main {
    position: relative; z-index: 1;
    max-width: 1500px;
    width: 90%;
    margin: 0 auto;
    padding: 0 0 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    flex-shrink: 0;
    height: calc(100vh - 80px);
    min-height: 0;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
  }

  /* ---- 卡片 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--tag-bg);
  }
  .card-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .card-body {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* ---- 文本输入 ---- */
  #novel-input {
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  #novel-input:focus {
    border-color: var(--accent);
  }
  #novel-input::placeholder {
    color: #c4b8a7;
  }

  /* ---- 按钮 ---- */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--tag-bg); }

  /* ---- YAML 输出区 ---- */
  #yaml-output {
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    background: #fdfcf9;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #yaml-output:empty::after {
    content: "转换结果将在这里显示...";
    color: #c4b8a7;
  }
  #yaml-editor {
    flex: 1;
    min-height: 0;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    background: #fdfcf9;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  #yaml-editor:focus {
    border-color: var(--accent);
  }
  #yaml-error {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    color: #b33;
    background: #fef2f2;
    border: 1px solid #fecaca;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ---- 状态提示 ---- */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    animation: slideDown 0.3s ease;
    display: none;
  }
  .toast.error {
    display: block;
    background: var(--error-bg);
    color: var(--error-text);
    border: 1px solid var(--error-border);
  }
  .toast.success {
    display: block;
    background: #f0fdf4;
    color: var(--success-text);
    border: 1px solid #bbf7d0;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ---- 加载动画 ---- */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .loading .spinner { display: inline-block; }
  .loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- 字数统计 ---- */
  .char-count {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ---- 输出区标签切换 ---- */
  .output-tabs {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .output-tab {
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: var(--card);
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.2s;
  }
  .output-tab:hover { background: var(--tag-bg); }
  .output-tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* ---- 场景卡片预览 ---- */
  #scene-preview {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  #scene-preview.show { display: flex; }

  .scene-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .scene-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--tag-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .scene-id { font-weight: 700; color: var(--accent); font-size: 0.85rem; }
  .scene-act {
    font-size: 0.75rem;
    color: var(--text-secondary);
    background: var(--card);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .scene-location, .scene-time {
    font-size: 0.82rem;
    color: var(--text-secondary);
  }
  .scene-card-body { padding: 14px 16px; max-height: 360px; overflow-y: auto; }

  .scene-setting {
    font-size: 0.84rem;
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--tag-bg);
    border-radius: 6px;
    border-left: 3px solid var(--accent);
  }

  .scene-characters {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    font-size: 0.8rem;
  }
  .scene-characters .label { color: var(--text-secondary); font-weight: 500; }
  .char-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    background: #ede9fe;
    color: #5b21b6;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .scene-actions { margin-bottom: 12px; }
  .scene-actions .label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }
  .action-item {
    font-size: 0.82rem;
    color: var(--text-secondary);
    padding: 3px 0 3px 14px;
    position: relative;
    line-height: 1.6;
  }
  .action-item::before {
    content: "·";
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: 700;
  }

  .scene-dialogues { margin-bottom: 12px; }
  .scene-dialogues .label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: block;
  }
  .dialogue-bubble {
    margin-bottom: 8px;
    padding: 10px 14px;
    background: #faf8f5;
    border-radius: 8px;
    border: 1px solid var(--border);
    position: relative;
  }
  .dialogue-speaker {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .dialogue-emotion {
    font-size: 0.73rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-left: 6px;
  }
  .dialogue-line {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
  }
  .dialogue-detail {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .dialogue-detail span { margin-right: 12px; }

  .scene-footer {
    display: flex;
    gap: 16px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }

  /* ---- 角色关系图谱 ---- */
  #graph-preview.show { display: flex !important; }
  #relation-canvas {
    background: #fdfcf9;
    cursor: grab;
  }
  #relation-canvas:active { cursor: grabbing; }
  .graph-legend div {
    color: var(--text-secondary);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
  }

  /* ---- 角色卡片预览 ---- */
  #char-preview {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  #char-preview.show { display: flex; }

  .char-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .char-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--tag-bg);
    border-bottom: 1px solid var(--border);
  }
  .char-name {
    font-weight: 700;
    color: var(--accent);
    font-size: 0.9rem;
  }
  .char-role {
    font-size: 0.75rem;
    background: var(--accent);
    color: #fff;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
  }
  .char-gender {
    font-size: 0.78rem;
    color: var(--text-secondary);
  }
  .char-card-body { padding: 12px 16px; }
  .char-detail {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .char-detail strong { color: var(--text); }
  .char-relationships {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 0.78rem;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .char-relationships .rel-label { color: var(--text-secondary); }
  .rel-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    background: #fef3c7;
    color: #92400e;
    font-size: 0.76rem;
    font-weight: 500;
  }

  .convert-status {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .convert-status.show { display: inline-flex; }
  .convert-status.ok { color: #166534; background: #dcfce7; }
  .convert-status.warn { color: #92400e; background: #fef3c7; }
  .api-key-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .api-key-row label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    white-space: nowrap;
    font-weight: 500;
  }
  .api-key-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.82rem;
    font-family: "Consolas", monospace;
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-row input:focus {
    border-color: var(--accent);
  }

  /* ---- 章节信息 ---- */
  .chapter-info {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    min-height: 24px;
  }
  .chapter-info .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .badge-ok { background: #dcfce7; color: #166534; }
  .badge-warn { background: #fef3c7; color: #92400e; }

  /* ---- 历史记录 ---- */
  .history-section {
    position: relative; z-index: 1;
    max-width: 1500px;
    width: 90%;
    margin: 0 auto;
    padding: 0 0 24px;
  }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    cursor: pointer;
    user-select: none;
  }
  .history-header h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .history-header .toggle-arrow {
    font-size: 0.8rem;
    color: var(--text-secondary);
    transition: transform 0.2s;
  }
  .history-header .toggle-arrow.open { transform: rotate(180deg); }
  .history-count {
    font-size: 0.75rem;
    background: var(--tag-bg);
    color: var(--text-secondary);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .history-list {
    display: none;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
    padding-bottom: 8px;
  }
  .history-list.show { display: flex; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-item:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }
  .history-item-content { flex: 1; min-width: 0; }
  .history-item-summary {
    font-size: 0.82rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item-time {
    font-size: 0.73rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .history-item-delete {
    font-size: 0.78rem;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: none;
    background: none;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .history-item-delete:hover {
    background: var(--error-bg);
    color: var(--error-text);
  }
  .history-empty {
    font-size: 0.82rem;
    color: var(--text-secondary);
    text-align: center;
    padding: 16px;
  }
  .history-clear {
    font-size: 0.78rem;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--card);
    font-family: inherit;
    transition: all 0.2s;
  }
  .history-clear:hover {
    background: var(--error-bg);
    color: var(--error-text);
    border-color: var(--error-border);

  /* ---- 下拉菜单 ---- */
  .dropdown-item:hover {
    background: var(--tag-bg) !important;
    color: var(--accent) !important;
  /* ---- 逐章转换进度 ---- */
  .chapter-progress {
    margin-top: 10px;
    padding: 10px 0;
  }
  .progress-bar-bg {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ---- YAML key 高亮 ---- */
  .yaml-key { color: #b8753b; }
  .yaml-string { color: #166534; }
  .yaml-comment { color: #9ca3af; font-style: italic; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="header">
  <h1>AI 小说转剧本工具</h1>
  <p>将小说章节自动转换为结构化 YAML 剧本，快速获得可编辑的剧本初稿</p>
</div>

<div class="main">

  <!-- 左侧：输入区 -->
  <div class="card">
    <div class="card-header">
      <h2>📖 小说原文</h2>
      <span class="char-count" id="char-count">0 字</span>
    </div>
    <div class="card-body">
      <div class="api-key-row">
        <label for="api-key">Key</label>
        <input type="password" id="api-key" placeholder="输入 DeepSeek API Key..." autocomplete="off">
      </div>
      <textarea id="novel-input" placeholder="在此粘贴小说文本（至少 3 章）..."></textarea>
      <input type="file" id="file-input" accept=".txt,.docx" style="display:none;">
      <div class="chapter-info" id="chapter-info"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-upload">上传文件</button>
        <button class="btn btn-secondary" id="btn-sample">加载示例文本</button>
        <button class="btn btn-primary" id="btn-convert">
          <span class="btn-text">转换为剧本</span>
          <span class="spinner"></span>
        </button>
        <button class="btn btn-secondary" id="btn-convert-chapters" style="display:none;">
          <span class="btn-text">📖 逐章转换</span>
          <span class="spinner"></span>
        </button>
        <span class="convert-status" id="convert-status"></span>
      </div>
      <div class="chapter-progress" id="chapter-progress" style="display:none;">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-text" id="progress-text">准备中...</div>
      </div>
    </div>
  </div>

  <!-- 右侧：输出区 -->
  <div class="card">
    <div class="card-header">
      <div class="output-tabs">
        <button class="output-tab active" id="tab-source">源码</button>
        <button class="output-tab" id="tab-preview">预览</button>
        <button class="output-tab" id="tab-char">角色</button>
        <button class="output-tab" id="tab-graph">关系图</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" id="btn-edit" style="padding:6px 14px;font-size:0.82rem;" disabled>编辑</button>

function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 柔和的圆点装饰
  const dots = [
    { x: canvas.width * 0.08, y: canvas.height * 0.15, r: 2.5, a: 0.12 },
    { x: canvas.width * 0.12, y: canvas.height * 0.22, r: 1.8, a: 0.08 },
    { x: canvas.width * 0.85, y: canvas.height * 0.18, r: 2.0, a: 0.10 },
    { x: canvas.width * 0.90, y: canvas.height * 0.28, r: 3.0, a: 0.06 },
    { x: canvas.width * 0.92, y: canvas.height * 0.70, r: 2.2, a: 0.09 },
    { x: canvas.width * 0.06, y: canvas.height * 0.75, r: 1.6, a: 0.11 },
    { x: canvas.width * 0.15, y: canvas.height * 0.85, r: 2.4, a: 0.07 },
    { x: canvas.width * 0.50, y: canvas.height * 0.05, r: 1.4, a: 0.05 },
  ];

  ctx.fillStyle = '#b8753b';
  for (const d of dots) {
    ctx.globalAlpha = d.a;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 柔和的连接线
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#b8753b';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dots[0].x, dots[0].y);
  ctx.bezierCurveTo(
    canvas.width * 0.3, canvas.height * 0.1,
    canvas.width * 0.6, canvas.height * 0.3,
    dots[3].x, dots[3].y
  );
  ctx.stroke();

  ctx.globalAlpha = 1;
}

// 修复 LLM 生成的 YAML 中的常见结构错误
function fixYamlCommonErrors(yamlText) {
  const lines = yamlText.split('\n');
  const output = [];
  let inDialogue = false;
  let dialogueIndent = 0;
  let skipIndent = -1;

  for (const line of lines) {
    const stripped = line.replace(/^\s+/, '');
    const indent = stripped ? line.length - stripped.length : -1;

    if (!stripped) { output.push(line); continue; }

    if (skipIndent >= 0) {
      if (indent > skipIndent) continue;
      skipIndent = -1;
    }

    if (/^-\s*character:/.test(stripped)) {
      inDialogue = true;
      dialogueIndent = indent;
      output.push(line);
      continue;
    }

    if (inDialogue && indent <= dialogueIndent) {
      inDialogue = false;
    }

    if (inDialogue && /^actions:\s*$/.test(stripped)) {
      skipIndent = indent;
      continue;
    }

    output.push(line);
  }
  return output.join('\n');
}

// 后端修复兜底：前端修复失败时调后端
async function fixViaBackend(yamlText) {

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novel_text: yamlText }),
    });
    if (resp.ok) {
      const data = await resp.json();
      return data.yaml_content;
    }
  } catch (e) {}
  return null;
}

// 解析 YAML 并渲染场景卡片
async function renderSceneCards(yamlText) {
  scenePreview.innerHTML = '';
  let data;
  try {
    if (typeof jsyaml === 'undefined') throw new Error('js-yaml 库未加载，请检查网络连接');
    let fixedYaml = fixYamlCommonErrors(yamlText);
    try {
      data = jsyaml.load(fixedYaml);
    } catch (e1) {
      // 前端修复失败，调后端修复兜底
      const backendFixed = await fixViaBackend(yamlText);
      if (backendFixed) {
        fixedYaml = backendFixed;
        data = jsyaml.load(fixedYaml);
      } else {
        throw e1;
      }
    }
  } catch (e) {
    scenePreview.innerHTML = '<div style="padding:20px;color:var(--error-text);text-align:center;">YAML 解析失败: ' + escHtml(e.message) + '</div>';
    return;
  }
  if (!data || !data.scenes || !data.scenes.length) {
    scenePreview.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center;">暂无场景数据</div>';
    return;
  }
  const characters = data.characters || [];
  const charMap = {};
  characters.forEach(c => { charMap[c.id] = c; });

  data.scenes.forEach(scene => {
    const card = document.createElement('div');
    card.className = 'scene-card';

    let charTags = '';
    if (scene.characters_present) {
      charTags = scene.characters_present.map(id => {
        const name = charMap[id] ? charMap[id].name : id;
        return `<span class="char-tag">${escHtml(name)}</span>`;
      }).join('');
    }

    let actionsHtml = '';
    if (scene.actions && scene.actions.length) {
      actionsHtml = '<div class="scene-actions"><span class="label">📝 动作</span>' +
        scene.actions.map(a => `<div class="action-item">${escHtml(a.content)}</div>`).join('') +
        '</div>';
    }

    let dialoguesHtml = '';
    if (scene.dialogues && scene.dialogues.length) {
      dialoguesHtml = '<div class="scene-dialogues"><span class="label">💬 对话</span>' +
        scene.dialogues.map(d => {
          const speakerName = charMap[d.character] ? charMap[d.character].name : d.character;
          let detail = '';
          if (d.parenthetical || d.action) {
            detail = '<div class="dialogue-detail">';
            if (d.parenthetical) detail += `<span>🎭 ${escHtml(d.parenthetical)}</span>`;
            if (d.action) detail += `<span>🎬 ${escHtml(d.action)}</span>`;
            detail += '</div>';
          }
          return `<div class="dialogue-bubble">
            <div class="dialogue-speaker">${escHtml(speakerName)}<span class="dialogue-emotion">${escHtml(d.emotion || '')}</span></div>
            <div class="dialogue-line">${escHtml(d.line)}</div>
            ${detail}
          </div>`;
        }).join('') +
        '</div>';
    }

    let footerHtml = '';
    if (scene.notes || scene.transition) {
      footerHtml = '<div class="scene-footer">';
      if (scene.notes) footerHtml += `<span>📌 ${escHtml(scene.notes)}</span>`;
      if (scene.transition) footerHtml += `<span>🎞 ${escHtml(scene.transition)}</span>`;
      footerHtml += '</div>';
    }

    card.innerHTML = `
      <div class="scene-card-header">
        <span class="scene-id">${escHtml(scene.id)}</span>
        ${scene.act ? `<span class="scene-act">第${escHtml(String(scene.act))}幕</span>` : ''}
        ${scene.location ? `<span class="scene-location">📍 ${escHtml(scene.location)}</span>` : ''}
        ${scene.time ? `<span class="scene-time">🕐 ${escHtml(scene.time)}</span>` : ''}
      </div>
      <div class="scene-card-body">
        ${scene.setting ? `<div class="scene-setting">${escHtml(scene.setting)}</div>` : ''}
        ${charTags ? `<div class="scene-characters"><span class="label">👤 出场</span>${charTags}</div>` : ''}
        ${actionsHtml}
        ${dialoguesHtml}
        ${footerHtml}
      </div>`;
    scenePreview.appendChild(card);
  });

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== 角色关系图谱（力导向图） =====
let graphNodes = [];
let graphEdges = [];
let graphAnimId = null;
let dragNode = null;

const ROLE_WEIGHT = { '主角': 1.0, '反派': 0.85, '配角': 0.7, '龙套': 0.5 };

function classifyRelation(relType) {
  if (!relType) return 'neutral';
  const t = relType.toLowerCase();
  const positive = ['朋友', '爱人', '夫妻', '恋人', '父', '母', '兄弟', '姐妹', '师徒', '同伴', '盟友', '好友', '搭档', '亲人', '家人'];
  const negative = ['敌人', '对手', '仇人', '情敌', '宿敌', '敌对', '对立', '仇恨', '背叛'];
  for (const p of positive) { if (t.includes(p)) return 'positive'; }
  for (const n of negative) { if (t.includes(n)) return 'negative'; }
  return 'neutral';
}

const REL_COLORS = { positive: '#16a34a', negative: '#dc2626', neutral: '#9ca3af' };

async function renderRelationGraph(yamlText) {
  if (graphAnimId) { cancelAnimationFrame(graphAnimId); graphAnimId = null; }

  let data;
  try {
    let fixedYaml = fixYamlCommonErrors(yamlText);
    try {
      data = jsyaml.load(fixedYaml);
    } catch (e1) {
      const backendFixed = await fixViaBackend(yamlText);
      if (backendFixed) { data = jsyaml.load(backendFixed); }
      else { throw e1; }
    }
  } catch (e) {
    return;
  }

  if (!data || !data.characters || !data.characters.length) return;

  const canvas = relationCanvas;
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx2 = canvas.getContext('2d');
  ctx2.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  const characters = data.characters;

  // 构建节点
  graphNodes = characters.map((c, i) => {
    const angle = (2 * Math.PI * i) / characters.length;
    const radius = Math.min(W, H) * 0.3;
    return {
      id: c.id,
      name: c.name,
      role: c.role || '配角',
      weight: ROLE_WEIGHT[c.role] || 0.6,
      x: W / 2 + radius * Math.cos(angle) + (Math.random() - 0.5) * 40,
      y: H / 2 + radius * Math.sin(angle) + (Math.random() - 0.5) * 40,
      vx: 0,
      vy: 0,
    };
  });

  // 构建边
  graphEdges = [];
  const nodeMap = {};
  graphNodes.forEach(n => { nodeMap[n.id] = n; });

  characters.forEach(c => {
    if (!c.relationships) return;
    c.relationships.forEach(rel => {
      let targetId, relType;
      if (typeof rel === 'string') {
        // 格式："CHAR_02: 朋友"
        const parts = rel.split(/[:：]/);
        targetId = parts[0] ? parts[0].trim() : '';
        relType = parts[1] ? parts[1].trim() : '';
      } else {
        targetId = rel.with || rel.target || '';
        relType = rel.type || rel.relation || '';
      }
      if (targetId && nodeMap[targetId]) {
        // 避免重复边
        const key = [c.id, targetId].sort().join('-');
        if (!graphEdges.find(e => e.key === key)) {
          graphEdges.push({
            key,
            source: nodeMap[c.id],
            target: nodeMap[targetId],
            type: relType,
            category: classifyRelation(relType),
          });
        }
      }
    });
  });

  // 力导向模拟
  const REPULSION = 5000;
  const ATTRACTION = 0.005;
  const DAMPING = 0.85;
  const CENTER_GRAVITY = 0.01;
  const ITERATIONS = 200;

  function simulate() {
    // 排斥力（所有节点对）
    for (let i = 0; i < graphNodes.length; i++) {
      for (let j = i + 1; j < graphNodes.length; j++) {
        const a = graphNodes[i], b = graphNodes[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = REPULSION / (dist * dist);
        let fx = (dx / dist) * force, fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      }
    }

    // 吸引力（边）
    graphEdges.forEach(e => {
      let dx = e.target.x - e.source.x, dy = e.target.y - e.source.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = dist * ATTRACTION;
      let fx = (dx / dist) * force, fy = (dy / dist) * force;
      e.source.vx += fx; e.source.vy += fy;
      e.target.vx -= fx; e.target.vy -= fy;
    });

    // 中心引力
    graphNodes.forEach(n => {
      n.vx += (W / 2 - n.x) * CENTER_GRAVITY;
      n.vy += (H / 2 - n.y) * CENTER_GRAVITY;
    });

    // 更新位置
    graphNodes.forEach(n => {
      if (n === dragNode) return;
      n.vx *= DAMPING;
      n.vy *= DAMPING;
      n.x += n.vx;
      n.y += n.vy;
      // 边界约束
      n.x = Math.max(40, Math.min(W - 40, n.x));
      n.y = Math.max(40, Math.min(H - 40, n.y));
    });
  }

  function draw() {
    ctx2.clearRect(0, 0, W, H);

    // 画边
    graphEdges.forEach(e => {
      ctx2.beginPath();
      ctx2.moveTo(e.source.x, e.source.y);
      ctx2.lineTo(e.target.x, e.target.y);
      ctx2.strokeStyle = REL_COLORS[e.category];
      ctx2.lineWidth = 2;
      ctx2.globalAlpha = 0.6;
      ctx2.stroke();
      ctx2.globalAlpha = 1;

      // 关系标签
      if (e.type) {
        const mx = (e.source.x + e.target.x) / 2;
        const my = (e.source.y + e.target.y) / 2;
        ctx2.font = '11px sans-serif';
        ctx2.fillStyle = REL_COLORS[e.category];
        ctx2.textAlign = 'center';
        ctx2.fillText(e.type, mx, my - 6);
      }
    });

    // 画节点
    graphNodes.forEach(n => {
      const r = 16 + n.weight * 20;

      // 节点圆
      ctx2.beginPath();
      ctx2.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx2.fillStyle = n.role === '主角' ? '#b8753b' : n.role === '反派' ? '#dc2626' : '#6b5e4a';
      ctx2.globalAlpha = 0.15;
      ctx2.fill();
      ctx2.globalAlpha = 1;
      ctx2.strokeStyle = n.role === '主角' ? '#b8753b' : n.role === '反派' ? '#dc2626' : '#9ca3af';
      ctx2.lineWidth = 2;
      ctx2.stroke();

      // 角色名
      ctx2.font = 'bold 13px "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx2.fillStyle = '#2c2416';
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'middle';
      ctx2.fillText(n.name, n.x, n.y);

      // 角色类型标签
      ctx2.font = '10px sans-serif';
      ctx2.fillStyle = '#6b5e4a';
      ctx2.fillText(n.role, n.x, n.y + r + 12);
    });
  }

  // 运行模拟
  for (let i = 0; i < ITERATIONS; i++) simulate();
  draw();

  // 拖拽交互
  canvas.onmousedown = (e) => {
    const mx = e.offsetX, my = e.offsetY;
    for (const n of graphNodes) {
      const r = 16 + n.weight * 20;
      if (Math.hypot(n.x - mx, n.y - my) < r + 5) {
        dragNode = n;
        canvas.style.cursor = 'grabbing';
        break;
      }
    }
  };
  canvas.onmousemove = (e) => {
    if (!dragNode) return;
    dragNode.x = e.offsetX;
    dragNode.y = e.offsetY;
    dragNode.vx = 0;
    dragNode.vy = 0;
    // 轻量重绘（不做完整模拟）
    draw();
  };
  canvas.onmouseup = () => {
    dragNode = null;
    canvas.style.cursor = 'grab';
  };
  canvas.onmouseleave = () => {
    dragNode = null;
    canvas.style.cursor = 'grab';
  };
}

// 上传文件（支持 .txt 和 .docx）
btnUpload.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'txt') {
    // .txt 文件前端直接读取
    const reader = new FileReader();
    reader.onload = () => {
      novelInput.value = reader.result;
      charCount.textContent = novelInput.value.length + ' 字';
      detectChapters();
    };
    reader.onerror = () => showToast('文件读取失败', 'error');
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'docx') {
    // .docx 文件发送到后端提取文本
    btnUpload.textContent = '解析中...';
    btnUpload.disabled = true;
    try {
      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch('/api/extract-docx', { method: 'POST', body: formData });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || '文件解析失败');
      }
      const data = await resp.json();
      novelInput.value = data.text;
      charCount.textContent = data.text.length + ' 字';
      detectChapters();
      showToast('文件解析成功', 'success');
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      btnUpload.textContent = '上传文件';
      btnUpload.disabled = false;
    }
  } else {
    showToast('仅支持 .txt 和 .docx 文件', 'error');
  }
  fileInput.value = '';
});

// 转换（SSE 流式）
btnConvert.addEventListener('click', async () => {
  const text = novelInput.value.trim();
  if (!text) {
    showToast('请先输入小说文本', 'error');
    return;
  }

  // 章节数校验：未检测过则先检测
  if (!lastChapterResult) {
    await detectChapters();
  }
  if (!lastChapterResult || !lastChapterResult.meets_minimum) {
    const count = lastChapterResult ? lastChapterResult.count : 0;
    if (count === 0) {
      showToast('未识别到章节，请确保文本包含"第X章"等章节标记，且至少 3 章', 'error');
    } else {
      showToast(`仅检测到 ${count} 章，至少需要 3 章小说内容才能转换`, 'error');
    }
    return;
  }

  btnConvert.classList.add('loading');
  btnConvert.disabled = true;
  yamlOutput.textContent = '';
  scenePreview.innerHTML = '';
  charPreview.innerHTML = '';
  lastRawYaml = '';
  // 转换开始时切回源码标签
  switchTab(tabSource);
  yamlOutput.style.display = '';
  let accumulated = '';

  try {
    const resp = await fetch('/api/convert-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novel_text: text, api_key: apiKeyInput.value }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '请求失败');
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'chunk') {
          accumulated += data.content;
          yamlOutput.innerHTML = highlightYaml(accumulated);
          yamlOutput.scrollTop = yamlOutput.scrollHeight;
        } else if (data.type === 'done' || data.type === 'done_warn') {
          yamlOutput.innerHTML = highlightYaml(data.yaml_content);
          lastRawYaml = data.yaml_content;
          btnDownload.disabled = false;
          btnCopy.disabled = false;
          btnEdit.disabled = false;
          addToHistory(data.yaml_content);
          if (data.warning) {
            showToast(data.warning, 'error');
          } else {
            showToast('转换完成！', 'success');
          }
        } else if (data.type === 'error') {
          showToast('转换失败: ' + data.message, 'error');
        }
      }
    }

    btnConvert.classList.remove('loading');
    btnConvert.disabled = false;

  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    btnConvert.classList.remove('loading');
    btnConvert.disabled = false;
  }
});

// 逐章转换（SSE 流式，按章节分步处理）
btnConvertChapters.addEventListener('click', async () => {
  const text = novelInput.value.trim();
  if (!text) {
    showToast('请先输入小说文本', 'error');
    return;
  }

  if (!lastChapterResult) {
    await detectChapters();
  }
  if (!lastChapterResult || !lastChapterResult.meets_minimum) {

    return;
  }

  btnConvertChapters.classList.add('loading');
  btnConvertChapters.disabled = true;
  btnConvert.disabled = true;
  yamlOutput.textContent = '';
  scenePreview.innerHTML = '';
  charPreview.innerHTML = '';
  lastRawYaml = '';
  switchTab(tabSource);
  yamlOutput.style.display = '';

  // 显示进度条
  chapterProgress.style.display = '';
  progressFill.style.width = '0%';
  progressText.textContent = '准备中...';

  let chapterResults = [];

  try {
    const resp = await fetch('/api/convert-chapters', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novel_text: text, api_key: apiKeyInput.value }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '请求失败');
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'start') {
          progressText.textContent = `共 ${data.total} 章，开始转换...`;
        } else if (data.type === 'chapter_start') {
          const pct = ((data.index - 1) / data.total * 100).toFixed(0);
          progressFill.style.width = pct + '%';
          progressText.textContent = `正在转换第 ${data.index}/${data.total} 章：${data.title}`;
          yamlOutput.textContent += `\n--- 第 ${data.index} 章：${data.title} ---\n`;
          yamlOutput.scrollTop = yamlOutput.scrollHeight;
        } else if (data.type === 'chapter_done') {
          chapterResults.push(data.yaml);
          yamlOutput.textContent += `✓ 完成\n`;
          yamlOutput.scrollTop = yamlOutput.scrollHeight;
        } else if (data.type === 'chapter_error') {
          yamlOutput.textContent += `✗ 失败: ${data.error}\n`;
          yamlOutput.scrollTop = yamlOutput.scrollHeight;
        } else if (data.type === 'done') {
          progressFill.style.width = '100%';
          progressText.textContent = `全部完成！共 ${data.chapter_count} 章转换成功`;
          lastRawYaml = data.yaml_content;
          yamlOutput.innerHTML = highlightYaml(data.yaml_content);
          btnDownload.disabled = false;
          btnCopy.disabled = false;
          btnEdit.disabled = false;
          showToast(`逐章转换完成！共 ${data.chapter_count} 章`, 'success');
        } else if (data.type === 'error') {
          showToast('转换失败: ' + data.message, 'error');
        }
      }
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  } finally {
    btnConvertChapters.classList.remove('loading');
    btnConvertChapters.disabled = false;
    btnConvert.disabled = false;

});

// 实时校验
function validateYaml() {
  clearTimeout(validateTimer);
  validateTimer = setTimeout(() => {
    try {
      const cleaned = fixYamlCommonErrors(yamlEditor.value);
      jsyaml.load(cleaned);
      yamlError.style.display = 'none';
      yamlEditor.style.borderColor = 'var(--accent)';
    } catch (e) {
      yamlError.textContent = e.message;
      yamlError.style.display = 'block';
      yamlEditor.style.borderColor = '#e44';
    }
  }, 400);
}
yamlEditor.addEventListener('input', validateYaml);

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

// Toast 提示
function showToast(msg, type) {

  toast.className = 'toast ' + type;
  toast.style.display = 'block';

}

// ===== 历史记录管理 =====
const HISTORY_KEY = 'novel_to_script_history';
const HISTORY_MAX = 20;

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  } catch { return []; }
}

function saveHistory(items) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
}

function addToHistory(yamlContent) {
  const text = novelInput.value.trim();
  const summary = text.substring(0, 200).replace(/\n/g, ' ');
  const item = {
    id: Date.now(),
    summary: summary,
    yaml: yamlContent,
    timestamp: new Date().toLocaleString('zh-CN'),
    inputLength: text.length,
  };
  const items = getHistory();
  items.unshift(item);
  if (items.length > HISTORY_MAX) items.length = HISTORY_MAX;
  saveHistory(items);
  renderHistory();
}

function deleteHistoryItem(id) {
  const items = getHistory().filter(i => i.id !== id);
  saveHistory(items);
  renderHistory();
}

function clearHistory() {
  if (!confirm('确定要清空所有历史记录吗？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function restoreHistoryItem(id) {
  const items = getHistory();
  const item = items.find(i => i.id === id);
  if (!item) return;
  lastRawYaml = item.yaml;
  yamlOutput.innerHTML = highlightYaml(item.yaml);
  btnDownload.disabled = false;
  btnCopy.disabled = false;
  btnEdit.disabled = false;
  switchTab(tabSource);
  yamlOutput.style.display = '';
  showToast('已恢复历史记录', 'success');
}

function renderHistory() {
  const items = getHistory();
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  const count = document.getElementById('history-count');

  if (items.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  count.textContent = items.length;

  list.innerHTML = items.map(item => `
    <div class="history-item" data-id="${item.id}">
      <div class="history-item-content">
        <div class="history-item-summary">${escHtml(item.summary)}...</div>
        <div class="history-item-time">${item.timestamp} · ${item.inputLength} 字</div>
      </div>
      <button class="history-item-delete" data-delete-id="${item.id}">删除</button>
    </div>
  `).join('');

  // 绑定事件
  list.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('history-item-delete')) return;
      restoreHistoryItem(Number(el.dataset.id));
    });
  });
  list.querySelectorAll('.history-item-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteHistoryItem(Number(btn.dataset.deleteId));
    });
  });
}

document.getElementById('history-header').addEventListener('click', () => {

// YAML 语法高亮
function highlightYaml(yaml) {
  return yaml
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // 注释
    .replace(/(#.*$)/gm, '<span class="yaml-comment">$1</span>')
    // key:
    .replace(/^(\s*)([\w一-鿿-]+)(\s*:)/gm,
      '$1<span class="yaml-key">$2</span>$3')
    // 字符串值（引号内）
    .replace(/("[^"]*")/g, '<span class="yaml-string">$1</span>');
}
